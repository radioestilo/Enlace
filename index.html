<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala Grupal - Background Fix</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; text-align: center; padding: 20px; margin: 0; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: 20px auto; }
        .btn { border: none; padding: 20px; width: 100%; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 15px; }
        .btn-join { background: #00ff88; color: #000; }
        .btn-mute { background: #333; color: white; display: none; }
        .btn-mute.active { background: #ff4444; }
        #status { margin-top: 20px; font-size: 13px; color: #888; border-top: 1px solid #333; padding-top: 15px; }
        .bg-tag { font-size: 10px; color: #00ff88; display: block; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#00ff88; margin-top:0;">👥 SALA GRUPAL</h2>
        <p id="instruction" style="color:#bbb;">Modo: Audio en segundo plano activado</p>
        
        <button id="btn-entrar" class="btn btn-join">ENTRAR A LA SALA</button>
        <button id="btn-mute" class="btn btn-mute">🎤 MICRO: ENCENDIDO</button>

        <div id="status">
            <div id="log">Sin conexión</div>
            <div id="user-count">Participantes: 0</div>
            <span class="bg-tag" id="bg-status"></span>
        </div>
    </div>

    <audio id="silent-audio" loop></audio>

    <script>
        const APP_ID = "b126756822f94ab3ad6caa7738663cbb"; 
        const CHANNEL = "sala_grupal"; 
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        
        let micTrack;
        let isMuted = false;
        let remoteUsers = {};

        const btnEntrar = document.getElementById('btn-entrar');
        const btnMute = document.getElementById('btn-mute');
        const log = document.getElementById('log');
        const silentAudio = document.getElementById('silent-audio');

        // Escuchar a otros
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                user.audioTrack.play();
                remoteUsers[user.uid] = user;
                actualizarContador();
            }
        });

        client.on("user-unpublished", (user) => {
            delete remoteUsers[user.uid];
            actualizarContador();
        });

        // TRUCO PARA SEGUNDO PLANO: Generar un tono silencioso
        function activarKeepAlive() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = ctx.createOscillator();
            const gainNode = ctx.createGain();
            
            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(440, ctx.currentTime);
            gainNode.gain.setValueAtTime(0, ctx.currentTime); // Volumen 0 (Silencio total)
            
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.start();
            
            document.getElementById('bg-status').innerText = "🛡️ PROTECCIÓN DE PROCESO ACTIVA";
        }

        btnEntrar.onclick = async function() {
            try {
                this.disabled = true;
                this.innerText = "CONECTANDO...";

                // Limpieza para Median
                if (client.connectionState !== "DISCONNECTED") {
                    await client.leave();
                }
                
                await client.join(APP_ID, CHANNEL, null, null);
                micTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await client.publish([micTrack]);

                // Activar protección de segundo plano
                activarKeepAlive();

                this.style.display = 'none';
                btnMute.style.display = 'block';
                log.innerText = "Conectado - Puedes minimizar la App";
                actualizarContador();

            } catch (e) {
                this.disabled = false;
                this.innerText = "REINTENTAR";
                if (e.message.includes("already in connecting/connected")) {
                    this.style.display = 'none';
                    btnMute.style.display = 'block';
                }
            }
        };

        btnMute.onclick = function() {
            if (!micTrack) return;
            isMuted = !isMuted;
            micTrack.setEnabled(!isMuted);
            this.classList.toggle('active', isMuted);
            this.innerText = isMuted ? "🔇 MICRO: SILENCIADO" : "🎤 MICRO: ENCENDIDO";
        };

        function actualizarContador() {
            const count = Object.keys(remoteUsers).length + 1;
            document.getElementById('user-count').innerText = `En la sala: ${count} personas`;
        }

        // Prevenir que el navegador suspenda el JS al minimizar
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                console.log("Manteniendo conexión en segundo plano...");
            }
        });
    </script>
</body>
</html>
