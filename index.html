<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Voz Grupal Pro</title>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.2.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #eee; text-align: center; padding: 20px; }
        .card { background: #161616; padding: 30px; border-radius: 20px; border: 1px solid #333; max-width: 400px; margin: auto; }
        .btn { border: none; padding: 20px; width: 100%; font-size: 18px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-bottom: 15px; }
        .btn-join { background: #00ff88; color: #000; }
        .btn-mute { background: #333; color: white; display: none; }
        .btn-mute.active { background: #ff4444; }
        #status { margin-top: 20px; font-size: 14px; color: #888; border-top: 1px solid #333; padding-top: 15px; }
        .user-list { text-align: left; font-size: 12px; margin-top: 10px; color: #00ff88; }
    </style>
</head>
<body>

    <div class="card">
        <h2 style="color:#00ff88; margin-top:0;">👥 SALA GRUPAL</h2>
        <p id="instruction">Únete para conversar con los demás</p>
        
        <button id="btn-entrar" class="btn btn-join">ENTRAR A LA SALA</button>
        <button id="btn-mute" class="btn btn-mute">🎤 MICRO: ENCENDIDO</button>

        <div id="status">
            <div id="log">Sin conexión</div>
            <div class="user-list" id="user-count">Participantes: 0</div>
        </div>
    </div>

    <script>
        const APP_ID = "b126756822f94ab3ad6caa7738663cbb"; 
        const CHANNEL = "sala_grupal"; 
        const client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
        
        let micTrack;
        let isMuted = false;
        let remoteUsers = {};

        const btnEntrar = document.getElementById('btn-entrar');
        const btnMute = document.getElementById('btn-mute');
        const log = document.getElementById('log');
        const userCountDisp = document.getElementById('user-count');

        // Escuchar a otros participantes
        client.on("user-published", async (user, mediaType) => {
            await client.subscribe(user, mediaType);
            if (mediaType === "audio") {
                user.audioTrack.play();
                remoteUsers[user.uid] = user;
                actualizarContador();
            }
        });

        client.on("user-unpublished", (user) => {
            delete remoteUsers[user.uid];
            actualizarContador();
        });

        // Función de entrada con limpieza de seguridad
        btnEntrar.onclick = async function() {
            try {
                // Bloqueo inmediato para evitar clics dobles
                this.disabled = true;
                this.innerText = "CONECTANDO...";

                // SEGURIDAD: Si el cliente ya está conectado o conectando, lo desconectamos primero
                if (client.connectionState !== "DISCONNECTED") {
                    await client.leave();
                }
                
                // Unirse al canal de forma limpia
                await client.join(APP_ID, CHANNEL, null, null);

                // Crear y publicar micrófono
                micTrack = await AgoraRTC.createMicrophoneAudioTrack();
                await client.publish([micTrack]);

                // Interfaz de éxito
                this.style.display = 'none';
                btnMute.style.display = 'block';
                document.getElementById('instruction').innerText = "Estás dentro de la sala";
                log.innerText = "Conectado - Todos pueden oírte";
                actualizarContador();

            } catch (e) {
                console.error("Error detectado:", e);
                this.disabled = false;
                this.innerText = "REINTENTAR";
                
                // Si el error indica que ya estamos dentro, forzamos la interfaz
                if (e.code === "INVALID_OPERATION") {
                    this.style.display = 'none';
                    btnMute.style.display = 'block';
                } else {
                    alert("Error al conectar: " + e.message);
                }
            }
        };

        // Control de micrófono (Mute)
        btnMute.onclick = function() {
            if (!micTrack) return;
            isMuted = !isMuted;
            micTrack.setEnabled(!isMuted);
            this.classList.toggle('active', isMuted);
            this.innerText = isMuted ? "🔇 MICRO: SILENCIADO" : "🎤 MICRO: ENCENDIDO";
            log.innerText = isMuted ? "No te escuchan (Mute)" : "Transmitiendo audio perfectamente";
        };

        function actualizarContador() {
            const count = Object.keys(remoteUsers).length + 1;
            userCountDisp.innerText = `En la sala: ${count} personas`;
        }
    </script>
</body>
</html>
